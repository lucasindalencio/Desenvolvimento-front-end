<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="index.html">Home</a>
    <h1>Informações Pessoais</h1>
    
    <form action="index.html">
        <fieldset>
            <legend>Cadastro do Cliente</legend>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" size="80" name="nome" placeholder="Digite o nome do cliente">
            </div>
            <br>
            <div>
                <label for="email">Idade:</label>
                <input type="number" id="email" size="1" name="email" placeholder="Digite a idade">
            </div>
            <br>
            <div>
                <label>Endereço:</label>
                <input type="text" size="100" placeholder="Digite o endereço">
            </div>
            <br>
            <div>
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade">
            </div>
            <br>
            <div>
                <label for="estado">Estado:</label>
                <input type="text" size="1" id="estado" name="estado" placeholder="UF">
            </div>
            <br>
            <div>
                <label>CEP:</label>
                <input type="number" id="cep" size="1" name="cep" placeholder="XXXXX-XXX ">
            </div>
            <br>
            <div>
                <label for="telefone">Tel/Res:</label>
                <input type="text" id="telefone" name="telefone" placeholder="99 99999-9999">
            </div>
            <br>
            <div>
                <label for="celular">Tel/Cel:</label>
                <input type="text" id="celular" name="celular" placeholder="99 99999-9999">
            </div>
            <br>
            <div>
                <label>Email:</label>
                <input type="email" size="100" placeholder="Digite o endereço de email">
            </div>
        </fieldset>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
